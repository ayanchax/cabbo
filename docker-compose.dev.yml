version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cabbo-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /home/ubuntu/cabbo-shared-data/logs:/app/logs
      - /home/ubuntu/cabbo-shared-data/share:/app/share        
    restart: "no"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]    
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: mysql:8 #Use the latest MySQL 8 image
    container_name: cabbo-db-dev
    restart: "no"
    env_file:
      - .env.dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    command: --innodb-buffer-pool-size=64M

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  db_data: