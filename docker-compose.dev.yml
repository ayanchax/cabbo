version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cabbo-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - /home/ubuntu/cabbo-shared-data/logs:/app/logs
      - /home/ubuntu/cabbo-shared-data/share:/app/share        
    restart: "no"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]    
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

 
 