[project]
description = "Backend for Cabbo cab booking platform"
name = "cabbo"
requires-python = ">=3.10"
version = "0.1.0"

dependencies = [
  "fastapi",
  "uvicorn",
  "python-dotenv",
  "sqlalchemy",
  "mysql-connector-python",
  "aiomysql",
  "email-validator",
  "twilio",
  "rich",
  "pydantic-settings",
  "sendgrid",
  "python-multipart",
  "mapbox",
  "Jinja2",
]

[tool.uv]
# uv-specific settings can be added here
